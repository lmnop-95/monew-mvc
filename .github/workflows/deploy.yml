name: Monew Server CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. Gradle 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 5. AWS 자격 증명 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 6. Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 7. Docker 이미지 빌드 및 태그
      - name: Build and tag Docker image
        id: build-image
        env:
          ECR_REPO_URI: ${{ secrets.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO_URI:$IMAGE_TAG .
          echo "image_uri=$ECR_REPO_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 8. Docker 이미지를 ECR에 푸시
      - name: Push Docker image to ECR
        run: docker push ${{ steps.build-image.outputs.image_uri }}

      # 9. Secrets Manager에서 DB 정보 가져오기
      - name: Fetch Secrets from AWS Secrets Manager
        id: fetch-secrets
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id prod/monew \
            --region ${{ secrets.AWS_REGION }} \
            --query SecretString --output text)

          echo "DB_PROD_HOST=$(echo $SECRET_JSON | jq -r .DB_PROD_HOST)" >> $GITHUB_ENV
          echo "DB_PROD_PORT=$(echo $SECRET_JSON | jq -r .DB_PROD_PORT)" >> $GITHUB_ENV
          echo "DB_PROD_NAME=$(echo $SECRET_JSON | jq -r .DB_PROD_NAME)" >> $GITHUB_ENV
          echo "DB_PROD_USER=$(echo $SECRET_JSON | jq -r .DB_PROD_USER)" >> $GITHUB_ENV
          echo "DB_PROD_PASSWORD=$(echo $SECRET_JSON | jq -r .DB_PROD_PASSWORD)" >> $GITHUB_ENV
          echo "PROD_MONGO_URI=$(echo $SECRET_JSON | jq -r .PROD_MONGO_URI)" >> $GITHUB_ENV

      # 10. CodeDeploy 배포 번들 생성
      - name: Create CodeDeploy Deployment Bundle
        run: |
          mkdir -p deploy-bundle/scripts
          cp appspec.yml deploy-bundle/
          cp scripts/start_server.sh deploy-bundle/scripts/
          cp scripts/stop_server.sh deploy-bundle/scripts/
          
          # 이미지 URI 파일 생성
          echo "${{ steps.build-image.outputs.image_uri }}" > deploy-bundle/image_uri.txt
          
          echo "환경 변수 파일 생성 중..."
          cat <<EOF > deploy-bundle/scripts/env_vars.sh
          #!/bin/bash
          export DB_PROD_HOST=${{ env.DB_PROD_HOST }}
          export DB_PROD_PORT=${{ env.DB_PROD_PORT }}
          export DB_PROD_NAME=${{ env.DB_PROD_NAME }}
          export DB_PROD_USER=${{ env.DB_PROD_USER }}
          export DB_PROD_PASSWORD=${{ env.DB_PROD_PASSWORD }}
          export PROD_MONGO_URI=${{ env.PROD_MONGO_URI }}
          EOF
          
          echo "=== 번들 내용 확인 ==="
          ls -R deploy-bundle
          
          cd deploy-bundle
          zip -r ../monew-server-deploy.zip .
          cd ..

      # 11. S3에 배포 번들 업로드
      - name: Upload Deployment Bundle to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_FOR_CODEDEPY }}
          S3_KEY: monew-server-deploy-${{ github.sha }}.zip
        run: |
          aws s3 cp monew-server-deploy.zip s3://$S3_BUCKET/$S3_KEY

      # 12. CodeDeploy 배포 생성
      - name: Create CodeDeploy Deployment
        id: deploy
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_FOR_CODEDEPY }}
          S3_KEY: monew-server-deploy-${{ github.sha }}.zip
        run: |
          # create-deployment의 JSON 출력을 DEPLOYMENT_OUTPUT_JSON 파일에 저장
          aws deploy create-deployment \
            --application-name ${{ secrets.CODEDEPLOY_APP_NAME }} \
            --deployment-group-name ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }} \
            --deployment-config-name CodeDeployDefault.OneAtATime \
            --description "Deployment from GitHub Actions ${{ github.sha }}" \
            --s3-location bucket=$S3_BUCKET,key=$S3_KEY,bundleType=zip \
            --ignore-application-stop-failures > deployment-output.json
          
          # 파일에서 deploymentId를 파싱하여 GitHub Actions 출력 변수로 설정
          DEPLOYMENT_ID=$(cat deployment-output.json | jq -r .deploymentId)
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      # 13. CodeDeploy 배포 완료 대기
      - name: Wait for CodeDeploy Deployment
        run: |
          echo "Waiting for deployment: ${{ steps.deploy.outputs.deployment_id }}"
          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.deploy.outputs.deployment_id }}
