version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/app/monew-server/
    overwrite: true

permissions:
  - object: /home/ubuntu/app/monew-server/scripts/
    pattern: "*.sh"
    owner: ubuntu
    group: ubuntu
    mode: 755
    type:
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 300
      runas: ubuntu

  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 120
      runas: ubuntu

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: ubuntu
